<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
}

/* CONTENEDOR */
.product{
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
  display:grid;
  grid-template-columns:600px 1fr;
  gap:50px;
}

/* GALERÍA */
.gallery{
  gap:15px;
}

.thumbs{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.thumbs img{
  width:80px;
  height:80px;
  object-fit:cover;
  cursor:pointer;
  border:2px solid #eee;
}

.thumbs img.active{
  border-color:black;
}

.main-image{
  width:500px;
}

.main-image img{
  width:100%;
  height:auto;
}

/* INFO */
.info h1{
  font-size:28px;
  margin-bottom:10px;
}

.price{
  font-size:26px;
  margin-bottom:20px;
}

select,button{
  width:100%;
  padding:12px;
  margin-bottom:10px;
}

button{
  background:black;
  color:white;
  border:none;
  font-weight:bold;
}

/* TABS */
.tabs{
  margin-top:40px;
  border-top:1px solid #ddd;
}

.tabs-head{
  display:flex;
  gap:20px;
  margin-top:15px;
}

.tabs-head div{
  cursor:pointer;
  padding-bottom:8px;
  border-bottom:2px solid transparent;
}

.tabs-head .active{
  border-color:black;
  font-weight:bold;
}

.tab{
  display:none;
  margin-top:20px;
  line-height:1.6;
}

.tab.active{
  display:block;
}

/* RESPONSIVE */
@media(max-width:768px){
  .product{
    grid-template-columns:1fr;
  }

  .gallery{
    flex-direction:column;
  }

  .thumbs{
    flex-direction:row;
  }

  .main-image{
    width:100%;
  }
}


#cart {font-size: 22px;
  position: fixed;
  top: 90px;
  right: 10px;
  background: none; /* Quitamos el fondo blanco */
  border: none; /* Quitamos el borde */
  padding: 0;
  width: auto; /* Hacemos que se ajuste al contenido */
  z-index: 999;
  box-shadow: none; /* Sin sombra */
  cursor: pointer;
}
#cart-details {
  font-size: 22px;
  color: black;
  background: white;
  border: 1px solid #ccc;
  padding: 10px;
  width: 270px;
  margin-top: 10px;
  box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
  position: absolute;
  right: 0;
}
    #cart-items img {
  width: 29px;
  height: 29px;
  object-fit: cover;
  margin-right: 10px;
  border-radius: 4px;
}
    #cart-items {
      max-height: 200px;
      overflow-y: auto;
      padding-left: 20px;
    }
  
.add-to-cart {
 width: 27%;
  padding: 5px 20px;
  margin-top: 10px;
  background: linear-gradient(135deg, #111, #333);
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  transition: all 0.25s ease;
  box-shadow: 0 6px 15px rgba(0,0,0,0.25);
}

.add-to-cart:hover {
  background: linear-gradient(135deg, #000, #555);
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.35);
}

.add-to-cart:active {
  transform: translateY(0px);
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.add-to-cart:disabled {
  background: #999;
  cursor: not-allowed;
  box-shadow: none;
}
.add-to-cart:hover {
  background-color: #0a53b5;
}
/* Responsive Design */
@media screen and (max-width: 768px) {
  .product-container {
    flex-direction: column;
  }  
  .product-image img {
    width: 100%;
    height: auto;
  }
  .product-details {
    width: 100%;
  }
}


.product{
  display:flex;
  gap:40px;
  max-width:1100px;
  margin:auto;
  font-family:Arial;
}

.gallery img{
  width:400px;
  border-radius:15px;
}

.info{
  max-width:500px;
}

.gen{
  color:#777;
  margin-bottom:10px;
}

.price{
  font-size:28px;
  color:#27ae60;
  margin:15px 0;
}

select{
  width:100%;
  padding:12px;
  border-radius:8px;
  margin-bottom:15px;
}

.add-to-cart{
  width:100%;
  padding:14px;
  background:black;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.add-to-cart:hover{
  background:#27ae60;
}

.badges{
  display:flex;
  gap:10px;
  color: black;
  margin:15px 0;
}

.badges span{
  background:#f1f1f1;
  padding:8px 10px;
  border-radius:8px;
  font-size:12px;
}

.stats{
  display:flex;
  gap:20px;
  color: black;
  margin:20px 0;
}

.stats div{
  background:#fafafa;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.tabs-head{
  display:flex;
  gap:20px;
  cursor:pointer;
  border-bottom:2px solid #eee;
}

.tabs-head div{
  padding:10px;
}

.tabs-head .active{
  border-bottom:2px solid black;
  font-weight:bold;
}

.tab{
  display:none;
  padding:15px 0;
}

.tab.active{
  display:block;
}
/* ===== MOBILE ===== */
@media (max-width: 768px){

  .product{
    flex-direction: column;
    gap:20px;
    padding:15px;
  }

  .gallery img{
    width:100%;
    max-width:100%;
  }

  .info{
    max-width:100%;
  }

  .price{
    font-size:24px;
    text-align:left;
  }

  select{
    font-size:16px;
  }

  .add-to-cart{
    font-size:16px;
    padding:16px;
  }

  .badges{
    flex-wrap:wrap;
    gap:8px;
  }

  .badges span{
    font-size:11px;
    padding:6px 8px;
  }

  .stats{
    flex-direction:column;
    gap:10px;
  }

  .stats div{
    display:flex;
    justify-content:space-between;
    padding:12px;
  }

  .tabs-head{
    justify-content:space-around;
  }

  .tabs-head div{
    font-size:14px;
  }

  .tab{
    font-size:14px;
    line-height:1.5;
  }

}
.main-image{
  padding:3px; /* grosor del borde */
  border-radius:18px;
  background:linear-gradient(145deg,
    #d4af37 0%,
    #f5e6a8 20%,
    #c9a74e 40%,
    #b8962e 60%,
    #f5e6a8 80%,
    #d4af37 100%
  );
}

.main-image img{
  width:100%;
  border-radius:15px;
  display:block;
}
</style>
</head>

<script>

let lastHeight = 0;

function sendHeight(){

const newHeight = document.body.scrollHeight;

if(Math.abs(newHeight - lastHeight) > 5){

lastHeight = newHeight;

parent.postMessage({
type:"resize",
height:newHeight
},"*");

}

}

window.addEventListener("load",sendHeight);
window.addEventListener("resize",sendHeight);

const observer = new MutationObserver(()=>{
setTimeout(sendHeight,120);
});

observer.observe(document.body,{
childList:true,
subtree:true
});

</script>

function enviarCarrito() {

  iframe.contentWindow.postMessage(
    { type: "carrito", data: carrito },
    "https://novie.in" // 🔥 IMPORTANTE: https
  );

  console.log("Carrito enviado:", carrito);
}

iframe.addEventListener("load", () => {
  enviarCarrito();

  // 🔁 asegurar entrega
  setTimeout(enviarCarrito, 300);
  setTimeout(enviarCarrito, 800);
});
</script>

<script>
window.addEventListener("message", function(event) {

  if (event.origin !== "https://novie.in") return;

  if (event.data.type === "resize") {
    const iframe = document.getElementById("secureFrame");

    iframe.style.height = event.data.height + "px";
  }

});
</script>

<script>
function changeImg(el){
  document.getElementById("mainImg").src = el.src;

  document.querySelectorAll(".thumbs img").forEach(img=>{
    img.classList.remove("active");
  });

  el.classList.add("active");
}

function tab(e,id){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tabs-head div").forEach(b=>b.classList.remove("active"));

  document.getElementById(id).classList.add("active");
  e.target.classList.add("active");
}
</script>
<script>
function toggleMenu(){
  const menu = document.getElementById('menu');
  const overlay = document.getElementById('overlay');
  const btn = document.querySelector('.menu-btn');
  menu.classList.toggle('active');
  overlay.classList.toggle('active');
  btn.classList.toggle('active');
}
